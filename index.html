<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicación Web</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>Mi Aplicación Web</h1>
    <nav aria-label="Menú principal">
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Clientes</a></li>
            <li><a href="#">Operaciones</a></li>
        </ul>
    </nav>
</header>

<div class="container">

    <aside aria-label="Menú lateral">
        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Informes</a></li>
            <li><a href="#">Configuración</a></li>
        </ul>
    </aside>

    <main>
        <!-- KPIs -->
        <section class="kpis">
            <article>
                <h2>Usuarios</h2>
                <p>1200</p>
            </article>
            <article>
                <h2>Ventas</h2>
                <p>350</p>
            </article>
            <article>
                <h2>Incidencias</h2>
                <p>15</p>
            </article>
        </section>

        <!-- Tabla -->
        <section>
            <h2>Actividad reciente</h2>
            <table>
                <thead>
                    <tr>
                        <th scope="col">Usuario</th>
                        <th scope="col">Acción</th>
                        <th scope="col">Fecha</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Juan</td>
                        <td>Alta cliente</td>
                        <td>10/06/2026</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <button aria-label="Crear nuevo registro">Nuevo</button>

        <!-- Alta de usuario -->
        <section aria-labelledby="alta-titulo">
            <h2 id="alta-titulo">Alta de nuevo usuario</h2>

            <form id="form-alta" novalidate>
                <div class="form-group">
                    <label for="nombre">Nombre de usuario</label>
                    <input type="text" id="nombre" name="nombre" required
                           minlength="3" maxlength="50"
                           autocomplete="username"
                           aria-required="true">
                </div>

                <div class="form-group">
                    <label for="fecha_alta">Fecha de alta</label>
                    <input type="date" id="fecha_alta" name="fecha_alta"
                           required aria-required="true">
                </div>

                <button type="submit">Dar de alta</button>
            </form>

            <p id="mensaje" class="mensaje" role="status" aria-live="polite"></p>
        </section>
    </main>

</div>

<footer>
    <p>&copy; 2026 Mi empresa</p>
</footer>

<script src="app.js"></script>
</body>
</html>
